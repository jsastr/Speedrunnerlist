<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTTiers — Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:#0d1117;
  color:#e8f0fe;
}

.banner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  background:#0f1e35;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand-mark{
  width:40px;height:40px;
  border-radius:10px;
  background:#2dd4a0;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;
}

.nav a{
  color:#9fb3c8;
  text-decoration:none;
  margin-left:10px;
  font-weight:700;
}

.nav a:hover{color:#fff;}

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-family:'Rajdhani',sans-serif;
  font-size:48px;
}

.hero h1 span{color:#2dd4a0;}

.leaderboard{
  max-width:900px;
  margin:20px auto;
  background:#161b24;
  border-radius:12px;
  overflow:hidden;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.row:hover{
  background:rgba(45,212,160,0.08);
}

</style>
</head>

<body>

<header class="banner">
  <div class="brand">
    <div class="brand-mark">TT</div>
    <div>
      <div><b>TTTiers</b></div>
      <small>Speedrun Rankings</small>
    </div>
  </div>

  <div class="nav">
    <a href="index.html">Leaderboard</a>
    <a href="stats.html">Stats</a>
  </div>
</header>

<section class="hero">
  <h1>Roblox <span>Speedrunners</span></h1>
  <p>Ranked by Bounce, No Bounce, Consistency & Camera Control.</p>
</section>

<div class="leaderboard" id="list"></div>

<script>
async function load(){
  const res = await fetch("runners.json");
  const data = await res.json();

  data.sort((a,b)=>
    (b.bounce+b.nobounce+b.consistency+b.cam) -
    (a.bounce+a.nobounce+a.consistency+a.cam)
  );

  const list = document.getElementById("list");

  list.innerHTML = data.map((r,i)=>`
    <div class="row" onclick="location.href='stats.html'">
      <div>#${i+1} @${r.name}</div>
      <div>${r.bounce+r.nobounce+r.consistency+r.cam}</div>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
