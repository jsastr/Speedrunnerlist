<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTTiers — Stat Rankings</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:#111827;
  color:#e8f0fe;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 24px;
  background:#1a2332;
}

.nav a{
  color:#9fb3c8;
  margin-left:10px;
  text-decoration:none;
  font-weight:700;
}

.nav a:hover{color:#fff;}

.hero{
  text-align:center;
  padding:30px;
}

.hero h1{
  font-size:36px;
}

.grid{
  max-width:1000px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
}

.card{
  background:#1e2a38;
  border-radius:12px;
  padding:12px;
}

.card h3{
  margin-bottom:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}
</style>
</head>

<body>

<header class="topbar">
  <div><b>TTTiers</b></div>
  <div class="nav">
    <a href="index.html">Leaderboard</a>
    <a href="stats.html">Stats</a>
  </div>
</header>

<section class="hero">
  <h1>Stat Rankings</h1>
  <p>Top players per stat</p>
</section>

<div class="grid" id="grid"></div>

<script>
const stats = ["bounce","consistency","cam","nobounce"];

async function load(){
  const res = await fetch("runners.json");
  const data = await res.json();

  const grid = document.getElementById("grid");

  grid.innerHTML = stats.map(stat=>{
    const sorted = [...data].sort((a,b)=>b[stat]-a[stat]);

    return `
      <div class="card">
        <h3>${stat.toUpperCase()}</h3>
        ${sorted.slice(0,10).map((r,i)=>`
          <div class="item">
            <span>#${i+1} ${r.name}</span>
            <span>${r[stat]}</span>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");
}

load();
</script>

</body>
</html>
